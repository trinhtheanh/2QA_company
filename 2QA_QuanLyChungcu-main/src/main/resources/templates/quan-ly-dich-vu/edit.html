<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head>
    <meta charset="UTF-8">
    <title>Sua dich vu</title>
</head>
<body>
<div layout:fragment="content" class="container body-content">
    <div class="mt-4 mb-4">
        <h2 style="font-weight:700; color:#1e293b;">
            <i class="bi bi-pencil-square me-2" style="color:#f59e0b;"></i>Sua dich vu
        </h2>
    </div>

    <div class="card" style="border:none; border-radius:12px; box-shadow:0 2px 12px rgba(0,0,0,0.06); max-width:700px;">
        <div class="card-body p-4">
            <form th:action="@{/quan-ly-dich-vu/save}" th:object="${service}" method="post" enctype="multipart/form-data">
                <input type="hidden" th:field="*{id}"/>

                <div class="mb-3">
                    <label for="name" class="form-label fw-semibold">Ten dich vu <span class="text-danger">*</span></label>
                    <input class="form-control" type="text" id="name" th:field="*{name}" required
                           style="border-radius:8px; padding:10px 14px;">
                </div>

                <div class="mb-3">
                    <label for="description" class="form-label fw-semibold">Mo ta</label>
                    <textarea class="form-control" id="description" th:field="*{description}" rows="4"
                              style="border-radius:8px; padding:10px 14px;"></textarea>
                </div>

                <div class="mb-3">
                    <label for="categoryId" class="form-label fw-semibold">Nhom dich vu</label>
                    <select class="form-select" id="categoryId" th:field="*{category.id}"
                            style="border-radius:8px; padding:10px 14px;">
                        <option value="">-- Chon nhom dich vu --</option>
                        <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}"></option>
                    </select>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="provider" class="form-label fw-semibold">Nha cung cap</label>
                        <input class="form-control" type="text" id="provider" th:field="*{provider}"
                               style="border-radius:8px; padding:10px 14px;">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="unit" class="form-label fw-semibold">Don vi tinh</label>
                        <input class="form-control" type="text" id="unit" th:field="*{unit}"
                               style="border-radius:8px; padding:10px 14px;">
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="costType" class="form-label fw-semibold">Loai tinh phi</label>
                        <select class="form-select" id="costType" th:field="*{costType}"
                                style="border-radius:8px; padding:10px 14px;">
                            <option value="">-- Chon loai --</option>
                            <option value="CO_DINH">Co dinh</option>
                            <option value="THEO_SO_LUONG">Theo so luong</option>
                            <option value="THEO_DIEN_TICH">Theo dien tich</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="costValue" class="form-label fw-semibold">Don gia</label>
                        <input class="form-control" type="number" step="1000" min="0" id="costValue" th:field="*{costValue}"
                               style="border-radius:8px; padding:10px 14px;">
                    </div>
                </div>

                <div class="mb-3">
                    <label for="price" class="form-label fw-semibold">Gia (VND) <span class="text-danger">*</span></label>
                    <input class="form-control" type="number" step="1000" min="0" id="price" th:field="*{price}" required
                           style="border-radius:8px; padding:10px 14px;">
                </div>

                <!-- Hinh anh hien tai -->
                <div class="mb-3" th:if="${service.imageUrl != null}">
                    <label class="form-label fw-semibold">Hinh anh hien tai</label>
                    <div>
                        <img th:src="@{${service.imageUrl}}" style="max-width:200px; max-height:200px; border-radius:8px; border:1px solid #e5e7eb;" alt="current">
                    </div>
                </div>

                <div class="mb-4">
                    <label for="imageFile" class="form-label fw-semibold">Thay doi hinh anh</label>
                    <input class="form-control" type="file" id="imageFile" name="imageFile" accept="image/*"
                           style="border-radius:8px; padding:10px 14px;" onchange="previewImage(event)">
                    <small class="text-muted">De trong neu khong muon thay doi</small>
                    <div id="imagePreview" class="mt-2" style="display:none;">
                        <img id="previewImg" style="max-width:200px; max-height:200px; border-radius:8px; border:1px solid #e5e7eb;" alt="preview">
                    </div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success" style="border-radius:10px; padding:10px 28px; font-weight:600;">
                        <i class="bi bi-check-lg me-1"></i>Cap nhat
                    </button>
                    <a th:href="@{/quan-ly-dich-vu}" class="btn btn-secondary" style="border-radius:10px; padding:10px 28px;">Huy</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script th:inline="javascript">
function previewImage(event) {
    var reader = new FileReader();
    reader.onload = function() {
        var preview = document.getElementById('previewImg');
        preview.src = reader.result;
        document.getElementById('imagePreview').style.display = 'block';
    };
    reader.readAsDataURL(event.target.files[0]);
}
</script>
</body>
</html>
